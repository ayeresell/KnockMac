name: KnockMac
options:
  bundleIdPrefix: com.knockmac
  deploymentTarget:
    macOS: "15.0"
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "15.0"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""
    OTHER_CODE_SIGN_FLAGS: "--options=runtime"

targets:
  KnockMac:
    type: application
    platform: macOS
    sources:
      - path: KnockMac
        excludes:
          - "**/*.plist"
    info:
      path: KnockMac/Info.plist
      properties:
        LSUIElement: true
        LSMinimumSystemVersion: "15.0"
        NSHumanReadableCopyright: "Copyright © 2025 KnockMac"
        NSScreenCaptureUsageDescription: "KnockMac needs screen recording access to take screenshots when you knock."
        CFBundleIconFile: "AppIcon"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.knockmac.app
        PRODUCT_NAME: KnockMac
        INFOPLIST_FILE: KnockMac/Info.plist
        CODE_SIGN_ENTITLEMENTS: KnockMac/KnockMac.entitlements
    dependencies:
      - framework: IOKit.framework
        embed: false
      - framework: ScreenCaptureKit.framework
        embed: false

  KnockMacTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: KnockMacTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.knockmac.tests
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: KnockMac
